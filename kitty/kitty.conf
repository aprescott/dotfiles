# foreground #f2f2f2
# background #000000

# Nerd Fonts v3.4.0
#
# See:
#
#   https://sw.kovidgoyal.net/kitty/faq/#kitty-is-not-able-to-use-my-favorite-font
#   https://www.nerdfonts.com/cheat-sheet
#
symbol_map U+e000-U+e00a,U+e0a0-U+e0a2,U+e0a3,U+e0b0-U+e0b3,U+e0b4-U+e0c8,U+e0ca,U+e0cc-U+e0d7,U+e200-U+e2a9,U+e300-U+e3e3,U+e5fa-U+e6b7,U+e700-U+e8ef,U+ea60-U+ec1e,U+ed00-U+efce,U+f000-U+f2ff,U+f300-U+f381,U+f400-U+f533,U+f0001-U+f1af0 Symbols Nerd Font Mono

modify_font cell_height 1
text_composition_strategy 1 0
macos_thicken_font 0.08

text_fg_override_threshold 4.5 ratio

remember_window_size no
initial_window_width 160c
initial_window_height 48c

window_resize_step_cells 2
window_resize_step_cells 2

window_padding_width 2 3

resize_in_steps yes

enable_audio_bell no
visual_bell_color #333333
visual_bell_duration 0.25
# color215 #ffbb6a

input_delay 0
sync_to_monitor no
repaint_delay 5

# `no-cursor` is required for the cursor settings, but we actually use manual
# shell integration to maintain control over `PROMPT_COMMAND`.
shell_integration disabled
cursor_shape beam
cursor_beam_thickness 1.5
cursor_shape_unfocused underline
cursor_blink_interval 0.8 ease-in-out
cursor_stop_blinking_after 0

cursor_trail 1
cursor_trail_start_threshold 10

scrollback_lines 10000
scrollback_pager_history_size 0
wheel_scroll_multiplier 1.0
pixel_scroll yes

background_opacity 0.9
background_blur 15

macos_quit_when_last_window_closed yes
macos_option_as_alt yes

show_hyperlink_targets yes
url_style straight
underline_hyperlinks always

# Platform-specific config
include kitty.${KITTY_OS}.conf

# BEGIN_KITTY_THEME
# Argonaut
include current-theme.conf
# END_KITTY_THEME

active_border_color #ff94ac
inactive_border_color #8e2f4b

include theme-overrides.conf

tab_bar_style custom
tab_bar_edge top
tab_bar_align left

active_tab_foreground   #ff94ac
active_tab_background   #000000
active_tab_font_style   bold
inactive_tab_foreground #8e2f4b
inactive_tab_background #000000

# U+E64E nf-seti-text
tab_activity_symbol 
bell_on_tab ""
tab_separator "  "
tab_title_template        "{fmt.bg.default}{activity_symbol}  {index} {f'{title[:6]}…{title[-6:]}' if title.rindex(title[-1]) + 1 > 25 else title}{' []' if layout_name == 'stack' else ''} "
active_tab_title_template "{fmt.bg.default}  {index} {f'{title[:6]}…{title[-6:]}' if title.rindex(title[-1]) + 1 > 25 else title}{' []' if layout_name == 'stack' else ''} "

map_timeout 3.0

map f1 detach_tab ask

inactive_text_alpha 0.6

notify_on_cmd_finish invisible 0 notify
